<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Sheet to API Converter</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f4f6;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:100%;
    max-width:700px;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h1{
    margin-bottom:20px;
    text-align:center;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
}

button{
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
}

.generate{
    width:100%;
    margin-top:20px;
    background:#2563eb;
    color:white;
}

.generate:hover{
    background:#1d4ed8;
}

.output-box{
    margin-top:20px;
}

.output{
    background:#f8fafc;
    border:1px solid #ddd;
    padding:12px;
    border-radius:8px;
    word-break:break-all;
    min-height:50px;
}

.copy-btn{
    margin-top:10px;
    background:#16a34a;
    color:white;
}

.copy-btn:hover{
    background:#15803d;
}

.success{
    margin-top:10px;
    color:#16a34a;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

    <h1>Google Sheet → API URL</h1>

    <label>Google Sheet Link</label>
    <input
        type="text"
        id="sheetLink"
        placeholder="Paste Google Sheet URL here"
    >

    <label>Sheet Name</label>
    <input
        type="text"
        id="sheetName"
        placeholder="Example: Sheet1"
    >

    <button class="generate" onclick="generateApi()">
        Generate API URL
    </button>

    <div class="output-box">
        <label>API URL</label>

        <div class="output" id="output">
            Your API URL will appear here...
        </div>

        <button class="copy-btn" onclick="copyUrl()">
            Copy URL
        </button>

        <div class="success" id="message"></div>
    </div>

</div>

<script>
function generateApi() {

    const link =
        document.getElementById("sheetLink").value.trim();

    const sheetName =
        document.getElementById("sheetName").value.trim();

    const match = link.match(/\/d\/([a-zA-Z0-9-_]+)/);

    if (!match) {
        document.getElementById("output").textContent =
            "Invalid Google Sheet URL";
        return;
    }

    const sheetId = match[1];

    const apiUrl =
        `https://opensheet.elk.sh/${sheetId}/${encodeURIComponent(sheetName)}`;

    document.getElementById("output").textContent = apiUrl;

    document.getElementById("message").textContent = "";
}

function copyUrl() {

    const url =
        document.getElementById("output").textContent;

    if (
        !url ||
        url === "Your API URL will appear here..." ||
        url === "Invalid Google Sheet URL"
    ) {
        return;
    }

    navigator.clipboard.writeText(url);

    document.getElementById("message").textContent =
        "✅ API URL copied!";
}
</script>

</body>
</html>
